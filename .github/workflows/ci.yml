name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r backend/requirements.txt
      - run: pytest tests -q
        working-directory: backend

  frontend-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run typecheck:shared-types
      - run: npm run typecheck:api-client
      - run: npm run typecheck:dashboard
      - run: npm run typecheck:storefront

  e2e-tests:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-typecheck]
    timeout-minutes: 20
    env:
      E2E_RESET_TOKEN: local-e2e-reset
      TEST_RESET_TOKEN: local-e2e-reset
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7
      - if: always()
        run: docker compose down -v
