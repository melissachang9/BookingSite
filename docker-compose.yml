services:
  db:
    image: postgres:16-alpine
    container_name: booking-platform-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: booking_platform
      POSTGRES_USER: booking
      POSTGRES_PASSWORD: booking
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U booking -d booking_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: booking-platform-backend
    restart: unless-stopped
    environment:
      APP_NAME: Booking Platform API
      APP_ENV: development
      APP_PORT: 8000
      DATABASE_URL: postgresql+asyncpg://booking:booking@db:5432/booking_platform
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    container_name: booking-platform-dashboard
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://backend:8000/api/v1
      VITE_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
    depends_on:
      backend:
        condition: service_started
    ports:
      - "5173:5173"

  storefront:
    build:
      context: .
      dockerfile: apps/storefront/Dockerfile
    container_name: booking-platform-storefront
    restart: unless-stopped
    environment:
      API_BASE_URL: http://backend:8000/api/v1
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
    depends_on:
      backend:
        condition: service_started
    ports:
      - "3001:3000"

volumes:
  postgres_data: